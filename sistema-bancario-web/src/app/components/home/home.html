<div class="container mt-5 text-center">
  <h1 class="display-4 mb-5 text-primary">BANCO LEONCIO</h1>

  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow p-4 mb-4 bg-primary text-white border-0" style="cursor: pointer" routerLink="/admin">
        <i class="bi bi-person-badge-fill display-1"></i>
        <h3 class="mt-3">Painel Admin</h3>
        <p>Cadastrar novas contas no sistema.</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow p-4 mb-4 bg-success text-white border-0">
        <i class="bi bi-wallet2 display-1"></i>
        <h3 class="mt-3">Acesso Usuário</h3>

        <div class="mt-3">
          <input type="text" class="form-control mb-2 text-center"
                 [(ngModel)]="numeroContaDigitado" placeholder="Nº da Conta">

          <button class="btn btn-light w-100"
                  [disabled]="!numeroContaDigitado"
                  [routerLink]="['/usuario', numeroContaDigitado]">
            Entrar na Conta
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
