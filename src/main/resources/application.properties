spring.application.name=sistema-bancario
spring.datasource.url=jdbc:postgresql://localhost:5432/db_banco
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- CONFIGURAÇŐES DO KAFKA ---

# Endereço do servidor (Terminal 2 que vocę ligou)
spring.kafka.bootstrap-servers=localhost:9092

# Configuraçăo do Consumidor (Consumer)
# O group-id identifica seu sistema no cluster do Kafka
spring.kafka.consumer.group-id=sistema-bancario-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Configuraçăo do Produtor (Producer)
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring:
    kafka:
    bootstrap-servers: localhost:9092
    consumer:
    # MUDE O NOME DO GRUPO (ex: adicione um 'v2') para forçar o Kafka a tratar como um novo leitor
        group-id: grupo-banco-projeto-v2  
        # GARANTA QUE ESTEJA 'earliest' para buscar o histórico
        auto-offset-reset: earliest      
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

